<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card hero">
        <p class="eyebrow">dataset.fin-ally.net/admin</p>
        <h1>Admin Console</h1>
        <p class="muted">Requires JWT with admin role.</p>
        <p class="muted"><a href="/">Back to console</a></p>
      </section>

      <section class="card grid">
        <div>
          <h2>Login / Token</h2>
          <form id="login-form" class="stack">
            <input id="login-username" value="psyche" placeholder="username" required />
            <input id="login-password" type="password" placeholder="password" required />
            <button type="submit">Login</button>
          </form>
          <div class="stack">
            <button id="check-me" type="button">Check /auth/me</button>
            <button id="clear-token" type="button" class="ghost">Clear token</button>
          </div>
          <pre id="profile" class="output">Not loaded</pre>
        </div>

        <div>
          <h2>Users</h2>
          <button id="reload-users" type="button">Reload users</button>
          <pre id="users" class="output">Not loaded</pre>
        </div>
      </section>

      <section class="card grid">
        <div>
          <h2>Create user</h2>
          <form id="create-form" class="stack">
            <input id="create-username" placeholder="username" required />
            <input id="create-password" type="password" placeholder="password (min 8)" required />
            <input id="create-role" value="user" placeholder="role" required />
            <input id="create-tenant" value="default" placeholder="tenant" required />
            <input id="create-scopes" value="conversation:read conversation:write" placeholder="scopes (space-delimited)" />
            <button type="submit">Create</button>
          </form>
        </div>

        <div>
          <h2>Update / Delete user</h2>
          <form id="update-form" class="stack">
            <input id="update-username" placeholder="username" required />
            <input id="update-password" type="password" placeholder="new password (optional)" />
            <input id="update-role" placeholder="new role (optional)" />
            <input id="update-tenant" placeholder="new tenant (optional)" />
            <input id="update-scopes" placeholder="new scopes (space-delimited, optional)" />
            <button type="submit">Update</button>
          </form>
          <form id="delete-form" class="stack">
            <input id="delete-username" placeholder="username to delete" required />
            <button type="submit" class="ghost">Delete</button>
          </form>
        </div>
      </section>

      <section class="card">
        <h2>Result</h2>
        <pre id="result" class="output">Ready</pre>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
