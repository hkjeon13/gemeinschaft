x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    SERVICE_HOST: "${COMPOSE_SERVICE_HOST:-0.0.0.0}"
    DATABASE_URL: "${COMPOSE_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/gemeinschaft}"
    OBJECT_STORAGE_PROVIDER: "${COMPOSE_OBJECT_STORAGE_PROVIDER:-local_fs}"
    OBJECT_STORAGE_ROOT: "${COMPOSE_OBJECT_STORAGE_ROOT:-/data/object_storage}"
    EXPORT_STORAGE_DIR: "${COMPOSE_EXPORT_STORAGE_DIR:-/data/exports}"
    AGENT_RUNTIME_BASE_URL: "${COMPOSE_AGENT_RUNTIME_BASE_URL:-http://agent_runtime:8002}"
    CONVERSATION_ORCHESTRATOR_BASE_URL: "${COMPOSE_CONVERSATION_ORCHESTRATOR_BASE_URL:-http://conversation_orchestrator:8001}"
  volumes:
    - object_storage:${COMPOSE_OBJECT_STORAGE_ROOT:-/data/object_storage}
    - export_storage:${COMPOSE_EXPORT_STORAGE_DIR:-/data/exports}

x-app-common: &app-common
  <<: *common
  depends_on:
    postgres:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${COMPOSE_POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${COMPOSE_POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${COMPOSE_POSTGRES_DB:-gemeinschaft}"
    ports:
      - "${COMPOSE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COMPOSE_POSTGRES_USER:-postgres} -d ${COMPOSE_POSTGRES_DB:-gemeinschaft}"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    <<: *common
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "scripts/migrate.py", "up"]
    restart: "no"

  api_gateway:
    <<: *app-common
    command: ["python", "-m", "uvicorn", "services.api_gateway.app:app", "--host", "${COMPOSE_SERVICE_HOST:-0.0.0.0}", "--port", "${API_GATEWAY_PORT:-8000}"]
    ports:
      - "${API_GATEWAY_PORT:-8000}:${API_GATEWAY_PORT:-8000}"

  conversation_orchestrator:
    <<: *app-common
    command: ["python", "-m", "uvicorn", "services.conversation_orchestrator.app:app", "--host", "${COMPOSE_SERVICE_HOST:-0.0.0.0}", "--port", "${CONVERSATION_ORCHESTRATOR_PORT:-8001}"]
    ports:
      - "${CONVERSATION_ORCHESTRATOR_PORT:-8001}:${CONVERSATION_ORCHESTRATOR_PORT:-8001}"

  agent_runtime:
    <<: *app-common
    command: ["python", "-m", "uvicorn", "services.agent_runtime.app:app", "--host", "${COMPOSE_SERVICE_HOST:-0.0.0.0}", "--port", "${AGENT_RUNTIME_PORT:-8002}"]
    ports:
      - "${AGENT_RUNTIME_PORT:-8002}:${AGENT_RUNTIME_PORT:-8002}"

  data_ingestion:
    <<: *app-common
    command: ["python", "-m", "uvicorn", "services.data_ingestion.app:app", "--host", "${COMPOSE_SERVICE_HOST:-0.0.0.0}", "--port", "${DATA_INGESTION_PORT:-8003}"]
    ports:
      - "${DATA_INGESTION_PORT:-8003}:${DATA_INGESTION_PORT:-8003}"

  topic_pipeline:
    <<: *app-common
    command: ["python", "-m", "uvicorn", "services.topic_pipeline.app:app", "--host", "${COMPOSE_SERVICE_HOST:-0.0.0.0}", "--port", "${TOPIC_PIPELINE_PORT:-8004}"]
    ports:
      - "${TOPIC_PIPELINE_PORT:-8004}:${TOPIC_PIPELINE_PORT:-8004}"

  export_service:
    <<: *app-common
    command: ["python", "-m", "uvicorn", "services.export_service.app:app", "--host", "${COMPOSE_SERVICE_HOST:-0.0.0.0}", "--port", "${EXPORT_SERVICE_PORT:-8005}"]
    ports:
      - "${EXPORT_SERVICE_PORT:-8005}:${EXPORT_SERVICE_PORT:-8005}"

  scheduler:
    <<: *app-common
    command: ["python", "-m", "uvicorn", "services.scheduler.app:app", "--host", "${COMPOSE_SERVICE_HOST:-0.0.0.0}", "--port", "${SCHEDULER_PORT:-8006}"]
    ports:
      - "${SCHEDULER_PORT:-8006}:${SCHEDULER_PORT:-8006}"

volumes:
  postgres_data:
  object_storage:
  export_storage:
