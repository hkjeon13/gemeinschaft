services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gemeinschaft-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${FRONTEND_PORT:-10015}:80"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gemeinschaft-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - ./secrets:/run/secrets:ro
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      APP_WORKERS: "${APP_WORKERS:-1}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-500}"
      JWT_ALGORITHM: "${JWT_ALGORITHM:-RS256}"
      JWT_ISSUER: "${JWT_ISSUER:-gemeinschaft-api}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-gemeinschaft-clients}"
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRES_MINUTES:-15}"
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: "${JWT_REFRESH_TOKEN_EXPIRES_DAYS:-14}"
      JWT_PRIVATE_KEYS_FILE: "${JWT_PRIVATE_KEYS_FILE:-/run/secrets/jwt_private_keys.json}"
      JWT_PUBLIC_KEYS_FILE: "${JWT_PUBLIC_KEYS_FILE:-/run/secrets/jwt_public_keys.json}"
      JWT_PRIVATE_KEYS_JSON: "${JWT_PRIVATE_KEYS_JSON:-}"
      JWT_PUBLIC_KEYS_JSON: "${JWT_PUBLIC_KEYS_JSON:-}"
      JWT_ACTIVE_KID: "${JWT_ACTIVE_KID:-}"
      AUTH_USERS_FILE: "${AUTH_USERS_FILE:-/run/secrets/auth_users.json}"
      AUTH_USERS_JSON: "${AUTH_USERS_JSON:-}"
      AUTH_USER_STORE_BACKEND: "${AUTH_USER_STORE_BACKEND:-}"
      USER_MODEL_PREFERENCE_BACKEND: "${USER_MODEL_PREFERENCE_BACKEND:-postgres}"
      CONVERSATION_MODEL_LIST_BACKEND: "${CONVERSATION_MODEL_LIST_BACKEND:-postgres}"
      CONVERSATION_STORE_BACKEND: "${CONVERSATION_STORE_BACKEND:-hybrid}"
      CONVERSATION_HYBRID_REDIS_URL: "${CONVERSATION_HYBRID_REDIS_URL:-redis://valkey:6379/0}"
      CONVERSATION_HYBRID_REDIS_PREFIX: "${CONVERSATION_HYBRID_REDIS_PREFIX:-conversation_hot}"
      CONVERSATION_HYBRID_IDLE_SECONDS: "${CONVERSATION_HYBRID_IDLE_SECONDS:-1800}"
      CONVERSATION_HYBRID_FLUSH_INTERVAL_SECONDS: "${CONVERSATION_HYBRID_FLUSH_INTERVAL_SECONDS:-30}"
      CONVERSATION_HYBRID_FLUSH_BATCH_SIZE: "${CONVERSATION_HYBRID_FLUSH_BATCH_SIZE:-100}"
      CONVERSATION_HYBRID_WRITE_THROUGH: "${CONVERSATION_HYBRID_WRITE_THROUGH:-false}"
      CONVERSATION_MEDIA_ROOT: "${CONVERSATION_MEDIA_ROOT:-}"
      AUTH_ACCESS_COOKIE_NAME: "${AUTH_ACCESS_COOKIE_NAME:-access_token}"
      AUTH_REFRESH_COOKIE_NAME: "${AUTH_REFRESH_COOKIE_NAME:-refresh_token}"
      AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE:-true}"
      AUTH_COOKIE_SAMESITE: "${AUTH_COOKIE_SAMESITE:-none}"
      AUTH_COOKIE_DOMAIN: "${AUTH_COOKIE_DOMAIN:-}"
      AUTH_CSRF_COOKIE_NAME: "${AUTH_CSRF_COOKIE_NAME:-csrf_token}"
      AUTH_REQUIRE_CSRF: "${AUTH_REQUIRE_CSRF:-true}"
      AUTH_ALLOWED_ORIGINS: "${AUTH_ALLOWED_ORIGINS:-*}"
      AUTH_ALLOWED_ORIGIN_REGEX: "${AUTH_ALLOWED_ORIGIN_REGEX:-^https://([a-z0-9-]+\\.)?figma\\.(site|com)$}"
      AUTH_REQUIRE_DPOP: "${AUTH_REQUIRE_DPOP:-true}"
      DPOP_IAT_TOLERANCE_SECONDS: "${DPOP_IAT_TOLERANCE_SECONDS:-300}"
      AUTH_DEFAULT_TENANT: "${AUTH_DEFAULT_TENANT:-default}"
      AUTH_DEFAULT_SCOPES: "${AUTH_DEFAULT_SCOPES:-conversation:read conversation:write}"
      AUTH_ALLOW_PLAINTEXT_PASSWORDS: "${AUTH_ALLOW_PLAINTEXT_PASSWORDS:-false}"
      AUTHZ_POLICIES_JSON: "${AUTHZ_POLICIES_JSON:-}"
      AUTH_LOGIN_MAX_ATTEMPTS: "${AUTH_LOGIN_MAX_ATTEMPTS:-5}"
      AUTH_LOGIN_WINDOW_SECONDS: "${AUTH_LOGIN_WINDOW_SECONDS:-60}"
      AUTH_LOGIN_BLOCK_SECONDS: "${AUTH_LOGIN_BLOCK_SECONDS:-300}"
      AUTH_TRUST_PROXY_HEADERS: "${AUTH_TRUST_PROXY_HEADERS:-false}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-gpt-4o-mini}"
      OPENAI_DEFAULT_MODEL_ID: "${OPENAI_DEFAULT_MODEL_ID:-default}"
      MODEL_REGISTRY_BACKEND: "${MODEL_REGISTRY_BACKEND:-postgres}"
      MODEL_SECRET_ENCRYPTION_KEY: "${MODEL_SECRET_ENCRYPTION_KEY:-}"
      SECURITY_STATE_BACKEND: "${SECURITY_STATE_BACKEND:-postgres}"
      DATABASE_ENABLED: "${DATABASE_ENABLED:-true}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-gemeinschaft}"
      POSTGRES_USER: "${POSTGRES_USER:-gemeinschaft}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"

  postgres:
    image: postgres:16-alpine
    container_name: gemeinschaft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gemeinschaft}
      POSTGRES_USER: ${POSTGRES_USER:-gemeinschaft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gemeinschaft} -d ${POSTGRES_DB:-gemeinschaft}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: redis:7-alpine
    container_name: gemeinschaft-valkey
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
