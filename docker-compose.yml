services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gemeinschaft-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./secrets:/run/secrets:ro
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      APP_WORKERS: "${APP_WORKERS:-1}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-500}"
      JWT_ALGORITHM: "${JWT_ALGORITHM:-RS256}"
      JWT_ISSUER: "${JWT_ISSUER:-gemeinschaft-api}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-gemeinschaft-clients}"
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRES_MINUTES:-60}"
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: "${JWT_REFRESH_TOKEN_EXPIRES_DAYS:-14}"
      JWT_PRIVATE_KEYS_FILE: "${JWT_PRIVATE_KEYS_FILE:-/run/secrets/jwt_private_keys.json}"
      JWT_PUBLIC_KEYS_FILE: "${JWT_PUBLIC_KEYS_FILE:-/run/secrets/jwt_public_keys.json}"
      JWT_PRIVATE_KEYS_JSON: "${JWT_PRIVATE_KEYS_JSON:-}"
      JWT_PUBLIC_KEYS_JSON: "${JWT_PUBLIC_KEYS_JSON:-}"
      JWT_ACTIVE_KID: "${JWT_ACTIVE_KID:-}"
      AUTH_USERS_FILE: "${AUTH_USERS_FILE:-/run/secrets/auth_users.json}"
      AUTH_USERS_JSON: "${AUTH_USERS_JSON:-}"
      AUTH_DEFAULT_TENANT: "${AUTH_DEFAULT_TENANT:-default}"
      AUTH_DEFAULT_SCOPES: "${AUTH_DEFAULT_SCOPES:-conversation:read conversation:write}"
      AUTH_ALLOW_PLAINTEXT_PASSWORDS: "${AUTH_ALLOW_PLAINTEXT_PASSWORDS:-false}"
      AUTHZ_POLICIES_JSON: "${AUTHZ_POLICIES_JSON:-}"
      AUTH_LOGIN_MAX_ATTEMPTS: "${AUTH_LOGIN_MAX_ATTEMPTS:-5}"
      AUTH_LOGIN_WINDOW_SECONDS: "${AUTH_LOGIN_WINDOW_SECONDS:-60}"
      AUTH_LOGIN_BLOCK_SECONDS: "${AUTH_LOGIN_BLOCK_SECONDS:-300}"
      AUTH_TRUST_PROXY_HEADERS: "${AUTH_TRUST_PROXY_HEADERS:-false}"
      SECURITY_STATE_BACKEND: "${SECURITY_STATE_BACKEND:-postgres}"
      DATABASE_ENABLED: "${DATABASE_ENABLED:-true}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-gemeinschaft}"
      POSTGRES_USER: "${POSTGRES_USER:-gemeinschaft}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"

  postgres:
    image: postgres:16-alpine
    container_name: gemeinschaft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gemeinschaft}
      POSTGRES_USER: ${POSTGRES_USER:-gemeinschaft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gemeinschaft} -d ${POSTGRES_DB:-gemeinschaft}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
